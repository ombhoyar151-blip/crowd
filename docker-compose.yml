version: "3.9"

services:
  postgres:
    image: timescale/timescaledb:2-pg16
    environment:
      POSTGRES_USER: crowd
      POSTGRES_PASSWORD: crowd
      POSTGRES_DB: crowd
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crowd"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://crowd:crowd@postgres:5432/crowd
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-changeme}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: celery -A backend.worker.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql+asyncpg://crowd:crowd@postgres:5432/crowd
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - backend

  vision:
    build:
      context: .
      dockerfile: Dockerfile.vision
    volumes:
      - .:/app
      - model_cache:/root/.ultralytics
    environment:
      - VIDEO_SOURCE=${VIDEO_SOURCE:-file}
      - VIDEO_PATH=${VIDEO_PATH:-sample.mp4}
      - CONF_THRESHOLD=${CONF_THRESHOLD:-0.5}
      - DEVICE=${DEVICE:-cpu}
    depends_on:
      - backend
    stdin_open: true
    tty: true

volumes:
  pgdata:
  model_cache:
